<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashForge Dashboard</title>
  <link rel="stylesheet" href="css/global.css">
  <script type="text/javascript" src="script/global.js"></script>
</head>
<body>
    <div class="dashboard">
        <div class="dashboard-main">
            <div class="camera-section">
                <img id="liveCamera"
                     src="http://REPLACE_IPV4_ADDRESS:8080/?action=stream"
                     onerror="this.onerror=null;this.src='http://REPLACE_IPV4_ADDRESS:8080/?action=stream';"
                     alt="Camera View">
            </div>
            <div class="touchscreen-section">
                <canvas id="touchScreen"></canvas>
            </div>
        </div>

        <div class="dashboard-buttons">
            <button id="btnPause" type="button" onclick="onPrintPause()">Pause</button>
            <button id="btnResume" type="button" onclick="onPrintResume()">Resume</button>
            <button id="btnCancel" type="button" onclick="onPrintCancel()">Cancel</button>
        </div>
    </div>

    <script>
        initPage();
    </script>
</body>
